name: Release Prepare

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: js/pnpm-lock.yaml

      - name: Install
        working-directory: js
        run: pnpm install --frozen-lockfile

      - name: Validate schemas
        working-directory: js
        run: pnpm exec ajv compile --spec=draft2020
          -s ../schemas/agent-config.schema.json
          -s ../schemas/message.schema.json
          -s ../schemas/transcript.schema.json
          -s ../schemas/websocket-event.schema.json
          -s ../schemas/plugin-manifest.schema.json
          -s ../schemas/api-error.schema.json

      - name: Check
        working-directory: js
        run: pnpm check

      - name: Build
        working-directory: js
        run: pnpm build

      - name: Pack smoke
        working-directory: js
        run: pnpm pack:smoke

      - name: Test
        working-directory: js
        run: pnpm test

      - name: Lint
        working-directory: js
        run: pnpm lint

      - name: Create or update version PR
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          cwd: js
          version: pnpm version-packages
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
