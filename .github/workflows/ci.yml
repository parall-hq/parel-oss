name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: js/pnpm-lock.yaml

      - name: Install
        working-directory: js
        run: pnpm install --frozen-lockfile

      - name: Validate schemas
        working-directory: js
        run: pnpm exec ajv compile --spec=draft2020
          -s ../schemas/agent-config.schema.json
          -s ../schemas/message.schema.json
          -s ../schemas/transcript.schema.json
          -s ../schemas/websocket-event.schema.json
          -s ../schemas/plugin-manifest.schema.json
          -s ../schemas/api-error.schema.json

      - name: Check
        working-directory: js
        run: pnpm check

      - name: Build
        working-directory: js
        run: pnpm build

      - name: Pack smoke
        working-directory: js
        run: pnpm pack:smoke

      - name: Test
        working-directory: js
        run: pnpm test

      - name: Lint
        working-directory: js
        run: pnpm lint
